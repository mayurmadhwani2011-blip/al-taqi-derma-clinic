<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Al Taqi Poly Clinic logo mark</title>
  <desc id="desc">Square luxury clinic monogram T in gold over deep black.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E1B17"/>
      <stop offset="1" stop-color="#0E0D0B"/>
    </linearGradient>
    <linearGradient id="mark" x1="84" y1="84" x2="428" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0D7A9"/>
      <stop offset="1" stop-color="#B89453"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="32" fill="url(#bg)"/>
  <rect x="1" y="1" width="510" height="510" rx="31" stroke="#5A4A30" stroke-width="2"/>

  <rect x="95" y="96" width="98" height="84" rx="3" fill="url(#mark)"/>
  <rect x="207" y="96" width="210" height="84" rx="3" fill="url(#mark)"/>
  <rect x="207" y="180" width="98" height="236" rx="3" fill="url(#mark)"/>
</svg>
